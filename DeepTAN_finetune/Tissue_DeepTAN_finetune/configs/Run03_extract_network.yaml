# ==============================================================================
# Run03 Tissue-Specific Network Extraction Configuration
# ==============================================================================
#
# Pipeline position:
#   Run01: user-defined tissue scRNA files -> LitData
#   Run02: LitData -> tissue-specific fine-tuned DeepTAN checkpoint
#   Run03: LitData + fine-tuned checkpoint -> tissue-specific latent network
#
# Usage:
#   python src/Run03_extract_network.py \
#       --config configs/Run03_extract_network.yaml
#
# Optional command-line overrides:
#   python src/Run03_extract_network.py \
#       --config configs/Run03_extract_network.yaml \
#       --litdata_dir /path/to/tissue_litdata \
#       --finetuned_ckpt /path/to/best_model.ckpt \
#       --output_dir /path/to/tissue_network_output
#
# Notes:
#   - This is the recommended single-run GitHub-facing configuration.
#   - File and directory names are user-defined.
#   - Legacy multi-tissue / multi-split settings are not required for normal use.
# ==============================================================================


# ------------------------------------------------------------------------------
# Required model paths
# ------------------------------------------------------------------------------

# scRNA-pretrained DeepTAN checkpoint.
pretrained_ckpt: "/path/to/pretrained/best_model.ckpt"

# Fine-tuned checkpoint generated by Run02.
finetuned_ckpt: "/path/to/tissue_finetune_output/ExampleTissue/best_model.ckpt"


# ------------------------------------------------------------------------------
# Required LitData path
# ------------------------------------------------------------------------------

# LitData directory generated by Run01.
# It should directly contain:
#   trn/
#   val/
#   tst/
#   litdata_others2save.pkl
#   gene_cv_weights.csv
#   celltype_onehot.parquet
litdata_dir: "/path/to/tissue_litdata"


# ------------------------------------------------------------------------------
# Run metadata and output
# ------------------------------------------------------------------------------

# Human-readable tissue/run name.
# This is used in logs and metadata only.
tissue_name: "ExampleTissue"

# Optional split or run identifier.
# Leave null for the single-run workflow.
split_id: null

# Output directory.
# With simple_output: true, outputs are saved to:
#   output_dir/detsn/
output_dir: "/path/to/tissue_network_output"

# Recommended for user-facing single-run mode.
# If false, legacy outputs are saved under output_dir/<tissue>/<split>/detsn.
simple_output: true


# ------------------------------------------------------------------------------
# Fine-tuning module import
# ------------------------------------------------------------------------------

# Directory containing the Run02 tissue fine-tuning Python script.
# The script must define the class specified by finetune_class_name.
finetune_module_dir: "/path/to/Tissue_DeepTAN_finetune/src"

# Python module name of the Run02 fine-tuning script, without ".py".
finetune_module_name: "Run02_Tissue_finetune"

# LightningModule class name used in Run02.
finetune_class_name: "DeepTANFineTune"


# ------------------------------------------------------------------------------
# Advanced / legacy multi-tissue compatibility
# ------------------------------------------------------------------------------
# The following block is optional. It is kept only for users who still want to run
# the older multi-tissue configuration style.
#
# For the standard single-run workflow above, users can ignore this section.

finetune_output_dir: ""

tissues:
  ExampleTissue:
    litdata: "/path/to/tissue_litdata"
    ft_ckpt: "/path/to/tissue_finetune_output/ExampleTissue/best_model.ckpt"
    split: null

tissue_order:
  - ExampleTissue


# ------------------------------------------------------------------------------
# Hardware and dataloader
# ------------------------------------------------------------------------------

accelerator: "gpu"
devices: 1
precision: "32-true"
batch_size: 32
n_workers: 8

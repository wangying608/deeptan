# ==============================================================================
# Run03 Cell-Specific Network Extraction Configuration
# ==============================================================================
#
# Pipeline position:
#   Run01: user-defined scRNA files -> LitData
#   Run02: LitData -> cell-type fine-tuned DeepTAN checkpoint
#   Run03: LitData + fine-tuned checkpoint -> cell-specific latent network
#
# Usage:
#   python run_03_extract_cell_network_userfriendly.py \
#       --config cell_network_single.yaml
#
# Optional command-line overrides:
#   python run_03_extract_cell_network_userfriendly.py \
#       --config cell_network_single.yaml \
#       --litdata_dir /path/to/cell_litdata \
#       --finetuned_ckpt /path/to/best_model.ckpt \
#       --output_dir /path/to/cell_network_output
#
# Notes:
#   - This is the recommended single-run GitHub-facing configuration.
#   - File and directory names are user-defined.
#   - Legacy multi-cell-group settings are not required for normal use.
# ==============================================================================

# ------------------------------------------------------------------------------
# Required model paths
# ------------------------------------------------------------------------------

# scRNA-pretrained DeepTAN checkpoint.
pretrained_ckpt: "/path/to/pretrained/best_model.ckpt"

# Fine-tuned checkpoint generated by Run02.
finetuned_ckpt: "/path/to/output_cell_finetune/ExampleCellType/best_model.ckpt"


# ------------------------------------------------------------------------------
# Required LitData path
# ------------------------------------------------------------------------------

# LitData directory generated by Run01.
# It should directly contain:
#   trn/
#   val/
#   tst/
#   litdata_others2save.pkl
#   litdata_others2save.json
#   gene_cv_weights.csv
litdata_dir: "/path/to/cell_litdata"


# ------------------------------------------------------------------------------
# Run metadata and output
# ------------------------------------------------------------------------------

# Human-readable cell type / cell group name.
# This is used in logs and metadata only.
cell_group_name: "ExampleCellType"

# Optional split or run identifier.
# Leave null for the single-run workflow.
split_id: null

# Output directory.
# With simple_output: true, outputs are saved to:
#   output_dir/csn/
output_dir: "/path/to/cell_network_output"

# Recommended for user-facing single-run mode.
# If false, legacy outputs are saved under output_dir/<cell_group>/<split>/csn.
simple_output: true


# ------------------------------------------------------------------------------
# Fine-tuning module import
# ------------------------------------------------------------------------------

# Directory containing the Run02 fine-tuning Python script.
# The script must define the class specified by finetune_class_name.
finetune_module_dir: "/path/to/project/src"

# Python module name of the Run02 fine-tuning script, without ".py".
finetune_module_name: "Run02_Cell_Type_finetune"

# LightningModule class name used in Run02.
finetune_class_name: "DeepTANFineTune"


# ------------------------------------------------------------------------------
# Hardware and dataloader
# ------------------------------------------------------------------------------

accelerator: "gpu"
devices: 1
precision: "32-true"
batch_size: 32
n_workers: 8

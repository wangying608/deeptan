# ==============================================================================
# DeepTAN Cell-Type Fine-Tuning Configuration | Single-run example
# ==============================================================================
# Pipeline position:
#   Run01: user-defined scRNA files -> LitData
#   Run02: LitData -> cell-type fine-tuned DeepTAN checkpoint
#   Run03: LitData + checkpoint -> cell-specific network
#
# Recommended usage:
#   bash scripts/02_finetune_cell.sh configs/cell_finetune_single.yaml
#
# Notes:
#   - This example is intentionally single-run and GitHub-friendly.
#   - It does not require files to be named split_42_0.parquet, etc.
#   - The LitData directory below should be the output directory from Run01.
#   - seed controls training reproducibility; it is not a data split identifier.
# ===============================================================================

# ------------------------------------------------------------------------------
# Pretrained model
# ------------------------------------------------------------------------------

# scRNA-pretrained DeepTAN checkpoint.
pretrained_ckpt: "/path/to/pretrained/best_model.ckpt"

# Kept for compatibility with the original fine-tuning script.
# In this Run02 workflow the actual fine-tuning samples are loaded from LitData.
nmic_npz: "data/NMIC.npz"

# Output root for fine-tuned checkpoints and logs.
# The script will create:
#   output_dir/<cell_type_name>/
output_dir: "/path/to/output_cell_finetune"


# ------------------------------------------------------------------------------
# Cell-type fine-tuning mode
# ------------------------------------------------------------------------------

# Cell-type-specific fine-tuning usually uses one cell type per dataset, so
# classification is not informative. In recon_only mode:
#   - loss = reconstruction loss + anchor regularization;
#   - classification loss and classification metrics are skipped;
#   - the pretrained classification head is kept but not optimized.
recon_only: true


# ------------------------------------------------------------------------------
# Cell-type LitData
# ------------------------------------------------------------------------------

# The key name is a user-facing run/cell-type name. It is used in the output path.
# litdata must point to the Run01 output directory containing:
#   trn/
#   val/
#   tst/
#   litdata_others2save.pkl
#   gene_cv_weights.csv
#
# You can add more cell types by adding more entries and listing them under
# tissue_order. The default GitHub workflow uses one entry.
tissues:
  ExampleCellType:
    litdata: "/path/to/cell_litdata"

# Training order. For the single-run workflow, keep exactly one item here.
tissue_order:
  - ExampleCellType


# ------------------------------------------------------------------------------
# Optimization hyperparameters
# ------------------------------------------------------------------------------

base_lr: 3.0e-5

lr_multipliers:
  embed: 0.0
  feature_proj: 0.1
  fusion_mlp: 0.1
  gat_layers: 0.2
  pooling: 0.2
  ge_decoder: 0.3
  g_label_predictor: 0.0

weight_decay: 1.0e-5
warmup_epochs: 3
max_epochs: 99
min_epochs: 12
es_patience: 15
accumulate_grad_batches: 1
gradient_clip_val: 1.0


# ------------------------------------------------------------------------------
# Loss configuration
# ------------------------------------------------------------------------------

lambda_anchor: 0.02
focal_gamma: 2.0
loss_zero_coeff: 0.5


# ------------------------------------------------------------------------------
# Learning-rate scheduler
# ------------------------------------------------------------------------------

scheduler: "cosine_warm_restarts"
cosine_T0: 15
cosine_T_mult: 1
plateau_patience: 5
plateau_factor: 0.5
min_lr: 1.0e-7


# ------------------------------------------------------------------------------
# Hardware
# ------------------------------------------------------------------------------

accelerator: "gpu"
devices: 1
precision: "16-mixed"
n_workers: 8
batch_size: 32


# ------------------------------------------------------------------------------
# Reproducibility
# ------------------------------------------------------------------------------

# Training random seed. This is not a data split ID.
seed: 42
